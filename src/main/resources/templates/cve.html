<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en-US">
<head th:replace="~{fragments/common :: head(${cveId})}"></head>
<body>

<th:block th:replace="~{fragments/common :: header}"></th:block>

<div class="container mt-4">
    <div th:if="${advisory == null}" class="alert alert-info">
        No advisory found for <span th:text="${cveId}">CVE-XXXX-XXXX</span>.
    </div>

    <div th:if="${advisory != null}"
         th:with="severityClass=${
             #strings.equalsIgnoreCase(advisory.severity,'CRITICAL') or #strings.equalsIgnoreCase(advisory.severity,'HIGH') ? 'bg-danger' :
             #strings.equalsIgnoreCase(advisory.severity,'MEDIUM') ? 'bg-warning text-dark' :
             #strings.equalsIgnoreCase(advisory.severity,'LOW') ? 'bg-info text-dark' :
             'bg-secondary'}">

        <div class="d-flex justify-content-between align-items-start mb-3">
            <h2 class="font-monospace mb-0" th:text="${advisory.cveId}">CVE-XXXX-XXXX</h2>
            <span th:if="${advisory.severity != null and !#strings.isEmpty(advisory.severity)}"
                  class="badge"
                  th:classappend="${severityClass}"
                  th:text="${advisory.severity}">HIGH</span>
        </div>

        <p th:text="${advisory.description}">Description</p>

        <div class="row g-3 mb-3">
            <div class="col-md-6" th:if="${advisory.publishedDate != null}">
                <span class="text-muted">Published:</span>
                <span th:text="${#dates.format(advisory.publishedDate, 'yyyy-MM-dd')}">2026-01-01</span>
            </div>
            <div class="col-md-6" th:if="${advisory.lastModifiedDate != null}">
                <span class="text-muted">Last modified:</span>
                <span th:text="${#dates.format(advisory.lastModifiedDate, 'yyyy-MM-dd')}">2026-01-01</span>
            </div>
        </div>

        <div th:if="${advisory.cvssMetrics3 != null and !advisory.cvssMetrics3.isEmpty()}" class="mt-3">
            <p class="mb-1 small text-muted text-uppercase fw-semibold" style="letter-spacing:0.07em;">CVSS 3.x</p>
            <table class="table table-sm table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Source</th>
                        <th>Score</th>
                        <th>Severity</th>
                        <th>Vector</th>
                        <th>Exploitability</th>
                        <th>Impact</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="metric : ${advisory.cvssMetrics3}">
                        <td class="text-muted small" th:text="${metric.source}">source</td>
                        <td><strong th:text="${metric.baseScore}">0.0</strong></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${#strings.equalsIgnoreCase(metric.baseSeverity,'CRITICAL') or #strings.equalsIgnoreCase(metric.baseSeverity,'HIGH') ? 'bg-danger' :
                                                    #strings.equalsIgnoreCase(metric.baseSeverity,'MEDIUM') ? 'bg-warning text-dark' :
                                                    #strings.equalsIgnoreCase(metric.baseSeverity,'LOW') ? 'bg-info text-dark' :
                                                    'bg-secondary'}"
                                  th:text="${metric.baseSeverity}">HIGH</span>
                        </td>
                        <td class="font-monospace small" th:text="${metric.vectorString}">N/A</td>
                        <td th:text="${metric.exploitabilityScore}">N/A</td>
                        <td th:text="${metric.impactScore}">N/A</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${advisory.problemType != null and !#strings.isEmpty(advisory.problemType)}" class="mt-2">
            <span class="text-muted">Problem Type:</span>
            <span th:text="${advisory.problemType}">N/A</span>
        </div>

        <div th:if="${advisory.products != null and !advisory.products.isEmpty()}" class="mt-3">
            <p class="mb-1 small text-muted text-uppercase fw-semibold" style="letter-spacing:0.07em;">Products Affected</p>
            <table class="table table-sm table-striped table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Vendor</th>
                        <th>Product</th>
                        <th>Version</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="prod : ${advisory.products}">
                        <td th:text="${prod.vendor?.name}">vendor</td>
                        <td th:text="${prod.name}">product</td>
                        <td class="font-monospace small" th:text="${prod.version}">version</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/common :: footer}"></th:block>

</body>
</html>
