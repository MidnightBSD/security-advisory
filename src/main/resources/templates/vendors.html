<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en-US">
<head th:replace="~{fragments/common :: head('Vendors')}"></head>
<body>

<style>
    .vendor-groups {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
    }
    .vendor-group-link {
        display: inline-block;
        min-width: 2.75rem;
        padding: 0.35rem 0.5rem;
        text-align: center;
        border: 1px solid #dee2e6;
        border-radius: 0.25rem;
        text-decoration: none;
    }
    .vendor-group-link.active {
        background: #0d6efd;
        border-color: #0d6efd;
        color: #fff;
    }
    .vendor-columns {
        columns: 2;
        column-gap: 1.5rem;
    }
    @media (min-width: 576px) { .vendor-columns { columns: 3; } }
    @media (min-width: 768px) { .vendor-columns { columns: 4; } }
    @media (min-width: 992px) { .vendor-columns { columns: 5; } }
    .vendor-columns li {
        break-inside: avoid;
        padding: 0.1rem 0;
    }
</style>

<th:block th:replace="~{fragments/common :: header}"></th:block>

<div class="container mt-4">
    <h2>
        Vendors:
        <span th:text="${selectedGroup == 'other' ? 'Symbols' : selectedGroup}">A</span>
    </h2>

    <div class="vendor-groups my-3">
        <a class="vendor-group-link"
           th:each="group : ${vendorGroups}"
           th:classappend="${group == selectedGroup} ? 'active'"
           th:href="@{/vendors/{group}(group=${group})}"
           th:text="${group == 'other' ? 'Symbols' : group}">A</a>
    </div>

    <p th:if="${#lists.isEmpty(vendors)}">No vendors found in this group.</p>

    <ul class="list-unstyled vendor-columns" th:if="${!#lists.isEmpty(vendors)}">
        <li th:each="vendor : ${vendors}">
            <a th:href="@{/advisory/{name}(name=${vendor.name})}" th:text="${vendor.name}">Vendor Name</a>
        </li>
    </ul>
</div>

<th:block th:replace="~{fragments/common :: footer}"></th:block>

</body>
</html>
